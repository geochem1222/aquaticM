name: Update papers and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "18 21 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Fetch latest papers from Semantic Scholar
        env:
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scripts/update_papers.py --retmax 800 --merge-existing --query-limit 36 --email "$CONTACT_EMAIL" || echo "Semantic Scholar update failed; continuing with existing data."

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.json data/papers.js
          git diff --cached --quiet || git commit -m "Update paper data"
          git push

      - name: Build Pages artifact
        run: |
          mkdir -p /tmp/tracker-site
          cp -R assets data tools index.html README.md /tmp/tracker-site/
          touch /tmp/tracker-site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: /tmp/tracker-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d3c4a0c75b63c81d1e1bd100b75e81b512df22e3
