name: Update papers and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "18 21 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "data/papers.json"
      - "data/papers.js"
      - "data/update-status.json"

permissions:
  contents: write

concurrency:
  group: aquatic-metabolism-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Fetch latest papers from Semantic Scholar
        env:
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY || vars.SEMANTIC_SCHOLAR_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY || vars.S2_API_KEY }}
          SEMANTIC_API_KEY: ${{ secrets.SEMANTIC_API_KEY || vars.SEMANTIC_API_KEY }}
          SEMANTIC_SCHOLAR_API: ${{ secrets.SEMANTIC_SCHOLAR_API || vars.SEMANTIC_SCHOLAR_API }}
          S2_API: ${{ secrets.S2_API || vars.S2_API }}
        run: |
          set +e
          python scripts/update_papers.py --retmax 5000 --refresh-limit 800 --merge-existing > data/update.log 2>&1
          status=$?
          cat data/update.log
          python scripts/write_update_status.py --log data/update.log --status-code "$status"
          exit 0

      - name: Enrich Semantic Scholar details and recommendations
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY || vars.SEMANTIC_SCHOLAR_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY || vars.S2_API_KEY }}
          SEMANTIC_API_KEY: ${{ secrets.SEMANTIC_API_KEY || vars.SEMANTIC_API_KEY }}
          SEMANTIC_SCHOLAR_API: ${{ secrets.SEMANTIC_SCHOLAR_API || vars.SEMANTIC_SCHOLAR_API }}
          S2_API: ${{ secrets.S2_API || vars.S2_API }}
        run: |
          if [ -n "$SEMANTIC_SCHOLAR_API_KEY" ] || [ -n "$S2_API_KEY" ] || [ -n "$SEMANTIC_API_KEY" ] || [ -n "$SEMANTIC_SCHOLAR_API" ] || [ -n "$S2_API" ]; then
            echo "Semantic Scholar API key detected; running enrichment."
            python scripts/enrich_semantic_scholar.py --limit 5000 --edge-detail-limit 300 --edge-limit 12 --stale-days 30 || echo "Semantic Scholar enrichment failed; continuing with basic metadata."
          else
            echo "Semantic Scholar API key is not configured; skipping enrichment."
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.json data/papers.js data/update-status.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Update paper data"
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push failed; rebasing onto the latest main before retry $attempt."
            git fetch origin main
            git rebase -X theirs origin/main || {
              git rebase --abort || true
              echo "Rebase failed; keeping this run's generated data and retrying."
              git reset --soft origin/main
              git commit -m "Update paper data"
            }
            sleep 8
          done
          git push

      - name: Deploy static site to gh-pages branch
        run: |
          mkdir -p /tmp/tracker-site
          cp -R assets data tools index.html README.md /tmp/tracker-site/
          touch /tmp/tracker-site/.nojekyll
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch gh-pages
            git reset --hard origin/gh-pages
          else
            git switch --orphan gh-pages
          fi
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R /tmp/tracker-site/. .
          git add .
          git diff --cached --quiet || git commit -m "Deploy static site"
          git push origin gh-pages
